services:
  - type: web
    name: rag-system
    env: node
    region: singapore
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: PORT
        value: 4000

      # --- MongoDB ---
      - key: MONGODB_URI
        sync: false # Set manually in Render dashboard
      - key: MONGODB_DB
        value: rag_system
      - key: MONGODB_COLLECTION
        value: chunks
      - key: MONGODB_INDEX
        value: vector_index

      # --- MySQL ---
      - key: MYSQL_HOST
        sync: false # Set manually in Render dashboard
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_USER
        sync: false # Set manually in Render dashboard
      - key: MYSQL_PASSWORD
        sync: false # Set manually in Render dashboard
      - key: MYSQL_DB
        value: ssap_aman

      # --- Gemini API ---
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: GEMINI_LLM_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001

      # --- Upload Config ---
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_UPLOAD_MB
        value: 50
